kind = "mobile"
previewPath = "/"
title = "AI Chat"
version = "1.0.0"
id = "artifacts/ai-chat"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 24260

[services.development]
run = "pnpm --filter @workspace/ai-chat run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-chat", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/ai-chat", "run", "serve" ]

[services.env]
PORT = "24260"
BASE_PATH = "/"
